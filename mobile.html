<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ぷよクエ ダメージ計算機（スマホ版）</title>
<style>
  :root {
    --red: #e74c3c; --blue: #3498db; --green: #27ae60; --yellow: #f1c40f; --purple: #9b59b6;
    --bg: #f4f6fa; --card-bg: #ffffff; --border: #dde3ec; --text: #2c3e50; --sub: #7f8c9b;
    --accent: #5b6ee1;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Hiragino Sans", "Yu Gothic", sans-serif; background: var(--bg); color: var(--text); }
  input, select, button { font-family: inherit; }

  /* 上部固定: デッキ名 + 合計 */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--accent); color: #fff; padding: 8px 12px 10px; text-align: center;
  }
  #deckName {
    width: 100%; text-align: center; font-size: 15px; font-weight: 700; color: #fff;
    background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,.5); padding: 2px;
  }
  #deckName::placeholder { color: rgba(255,255,255,.6); }
  #deckName:focus { outline: none; border-bottom: 1px solid #fff; }
  #totalBar { font-size: 13px; margin-top: 4px; }
  #totalBar strong { font-size: 30px; margin-left: 6px; letter-spacing: 1px; }

  main { padding: 10px 10px calc(70px + env(safe-area-inset-bottom)); max-width: 640px; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }

  /* 下部タブバー */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; background: #fff; border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tabbar button {
    flex: 1; background: none; border: none; padding: 9px 0 7px; font-size: 11px; color: var(--sub); cursor: pointer;
  }
  .tabbar button .ico { display: block; font-size: 20px; margin-bottom: 1px; }
  .tabbar button.active { color: var(--accent); font-weight: 700; }

  /* デッキ帯 */
  #deckStrip { display: flex; align-items: flex-end; justify-content: center; gap: 4px; margin-bottom: 12px; }
  .dcard { position: relative; flex: 1 1 0; min-width: 0; text-align: center; }
  .dcard.lead { flex: 1.15 1 0; }
  .dimg { width: 100%; aspect-ratio: 1/1; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #eef1f8; display: flex; align-items: center; justify-content: center; }
  .dcard.lead .dimg { border: 2px solid var(--accent); }
  .dimg img { width: 100%; height: 100%; object-fit: contain; }
  .dimg .dph { color: var(--sub); font-size: 12px; font-weight: 700; }
  .dlabel { font-size: 9px; font-weight: 700; margin-top: 2px; color: var(--accent); height: 12px; }
  .dstar { position: absolute; top: -7px; right: -4px; font-size: 16px; pointer-events: none; filter: drop-shadow(0 0 3px #fff) drop-shadow(0 0 5px rgba(255,200,40,.9)); }

  /* カードグリッド */
  #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .gcard { position: relative; text-align: center; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card-bg); }
  .gimg { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eef1f8; cursor: pointer; }
  .gimg img { width: 100%; height: 100%; object-fit: contain; }
  .gimg .ph { color: var(--sub); font-size: 10px; line-height: 1.6; }
  .badge { display: inline-block; min-width: 0; padding: 0 4px; border-radius: 4px; color: #fff; font-size: 10px; }
  .c赤 { background: var(--red); } .c青 { background: var(--blue); } .c緑 { background: var(--green); }
  .c黄 { background: var(--yellow); color:#333; } .c紫 { background: var(--purple); } .cなし { background: #aaa; }
  .gname { font-size: 11px; font-weight: 600; padding: 4px 4px 0; line-height: 1.3; cursor: pointer; }
  .gdmg { font-size: 14px; color: var(--accent); font-weight: 700; padding: 2px 0 6px; cursor: pointer; }
  .gcombo {
    position: absolute; top: 2px; right: 2px; z-index: 1; border: none; font-size: 18px; line-height: 1;
    padding: 3px; cursor: pointer; background: rgba(255,255,255,.85); border-radius: 50%;
    filter: grayscale(1); opacity: .55;
  }
  .gcombo.on { filter: none; opacity: 1; background: #fff8dc; box-shadow: 0 0 10px 3px rgba(255,200,40,.9); }
  .note { font-size: 11px; color: var(--sub); text-align: center; margin: 10px 0; }

  /* 倍率リスト */
  .multbar { display: flex; gap: 8px; margin-bottom: 10px; }
  .multbar button { flex: 1; }
  button.act {
    background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer;
  }
  button.ghost { background: #fff; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer; }
  .rowitem { background: #fff; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .rowitem.off { opacity: .55; }
  .rowhead { display: flex; align-items: center; gap: 8px; padding: 9px 10px; cursor: pointer; }
  .rowhead .rowicon { width: 28px; height: 28px; object-fit: contain; border-radius: 5px; flex: none; }
  .rowhead .rname { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rowhead .rval { font-size: 13px; color: var(--accent); font-weight: 700; flex: none; }
  .rowhead .arrow { color: var(--sub); flex: none; font-size: 12px; }
  .rswitch { flex: none; width: 20px; height: 20px; accent-color: var(--accent); }
  .rowbody { border-top: 1px solid var(--border); padding: 10px; display: none; background: #fafbfe; }
  .rowitem.openbody .rowbody { display: block; }
  .rowbody .cline { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .rowbody .cline img { width: 26px; height: 26px; object-fit: contain; border-radius: 5px; flex: none; }
  .rowbody .cline .cn { flex: 1; min-width: 0; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--sub); }
  .rowbody input[type="number"], .rowbody input[type="text"] {
    font-size: 14px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; background: #fff;
  }
  .rowbody input.cell { width: 4.2em; text-align: right; }
  .rowtools { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .rowtools input[type="text"] { flex: 1; min-width: 8em; }
  button.small { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  button.danger { background: #c0392b; }

  /* 設定 */
  .setcard { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .setcard h3 { margin: 0 0 8px; font-size: 13px; color: var(--sub); }
  .colorbtns { display: flex; gap: 6px; }
  .colorbtns button {
    flex: 1; padding: 10px 0; border-radius: 8px; border: 2px solid transparent; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; opacity: .45;
  }
  .colorbtns button.sel { opacity: 1; border-color: var(--text); }
  .setline { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
  .setline select, .setline input { font-size: 14px; padding: 7px; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .setline input[type="number"] { width: 5.5em; text-align: right; }

  /* モーダル共通 */
  .modal { position: fixed; inset: 0; background: rgba(20,25,40,.55); display: none; align-items: flex-start; justify-content: center; padding: 6vh 12px 12px; z-index: 100; }
  .modal.open { display: flex; }
  .sbox { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 82vh; display: flex; flex-direction: column; padding: 14px; overflow-y: auto; }
  .sbox > input.search { width: 100%; font-size: 16px; padding: 9px; border: 1px solid var(--border); border-radius: 8px; }
  #searchResults { overflow-y: auto; margin-top: 8px; }
  .sitem { display: flex; gap: 10px; align-items: center; padding: 7px 4px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .sitem img { width: 46px; height: 46px; object-fit: contain; flex: none; }
  .mfoot { text-align: right; margin-top: 12px; }
  .cm-label { display: inline-block; font-size: 12px; font-weight: 700; color: #fff; background: var(--accent); padding: 2px 10px; border-radius: 10px; margin: 12px 0 4px; }
  .cm-label.sub { background: #8a93a8; }
  .cm-text { font-size: 13px; line-height: 1.8; }
  #cardModalHead { display: flex; gap: 12px; align-items: center; }
  #cardModalHead img { width: 68px; height: 68px; object-fit: contain; border-radius: 8px; flex: none; }

  /* カード編集モーダル */
  .eline { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; }
  .eline label { width: 4.5em; flex: none; color: var(--sub); }
  .eline input[type="text"], .eline input[type="number"], .eline select {
    flex: 1; font-size: 15px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: #fff; min-width: 0;
  }
  .ebtns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .ebtns button { flex: 1; min-width: 7em; }
</style>
</head>
<body>

<header>
  <input type="text" id="deckName" placeholder="デッキ名を入力">
  <div id="totalBar">合計ダメージ<strong id="totalBig">-</strong></div>
</header>

<main>
  <div id="tab-deck" class="tab active">
    <div id="deckStrip"></div>
    <div id="gallery"></div>
    <p class="note">カードの絵をタップ＝編集　／　名前📖＝スキル詳細　／　数字＝ダメージ詳細　／　✨＝コンビ</p>
  </div>

  <div id="tab-mult" class="tab">
    <div class="multbar">
      <button class="ghost" id="sortBtn">⇅ 同じ枠を隣に</button>
      <button class="act" id="addRowBtn">＋ 行を追加</button>
    </div>
    <div id="rowList"></div>
    <p class="note">行をタップすると開いて、カードごとの倍率を編集できます</p>
  </div>

  <div id="tab-set" class="tab">
    <div class="setcard">
      <h3>敵の属性</h3>
      <div class="colorbtns" id="enemyColors"></div>
    </div>
    <div class="setcard">
      <h3>敵の盾・共通設定</h3>
      <div class="setline">盾 <select id="enemyShield"></select></div>
      <div class="setline">応援デッキ攻撃 + <input type="number" id="supportAtk" step="10"></div>
      <div class="setline">主属性係数 <input type="number" id="coefMain"> 副属性係数 <input type="number" id="coefSub"></div>
    </div>
    <div class="setcard">
      <h3>その他</h3>
      <div class="ebtns">
        <button class="ghost" onclick="location.href='index.html'">PC版レイアウトへ</button>
        <button class="small danger" id="resetBtn" style="padding:9px">初期状態に戻す</button>
      </div>
    </div>
  </div>
</main>

<nav class="tabbar">
  <button data-tab="deck" class="active"><span class="ico">🃏</span>デッキ</button>
  <button data-tab="mult"><span class="ico">✖️</span>倍率</button>
  <button data-tab="set"><span class="ico">⚙️</span>設定</button>
</nav>

<div id="searchModal" class="modal">
  <div class="sbox">
    <input type="text" id="searchInput" class="search" placeholder="カード名の一部を入力（例：アミティ）">
    <div id="searchResults"></div>
    <p class="mfoot"><button id="searchClose" class="small danger">閉じる</button></p>
  </div>
</div>

<div id="skillModal" class="modal">
  <div class="sbox">
    <div id="skillModalTitle" style="font-weight:700; font-size:15px"></div>
    <div id="skillModalBody" style="margin-top:10px; font-size:13px; line-height:1.8"></div>
    <p class="mfoot"><button id="skillClose" class="small danger">閉じる</button></p>
  </div>
</div>

<div id="cardModal" class="modal">
  <div class="sbox">
    <div id="cardModalHead"></div>
    <div id="cardModalBody"></div>
    <p class="mfoot"><button id="cardClose" class="small danger">閉じる</button></p>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="sbox">
    <div id="editTitle" style="font-weight:700; font-size:15px; margin-bottom:12px">カード編集</div>
    <div class="ebtns" style="margin-bottom:12px">
      <button class="act" id="editSearch">🔍 カードDBから選ぶ</button>
    </div>
    <div class="eline"><label>名前</label><input type="text" id="editName"></div>
    <div class="eline"><label>攻撃力</label><input type="number" id="editAtk"></div>
    <div class="eline"><label>主属性</label><select id="editMain"></select></div>
    <div class="eline"><label>副属性</label><select id="editSub"></select></div>
    <div class="eline"><label>コンビ✨</label><input type="checkbox" id="editCombo" style="width:22px;height:22px;flex:none;accent-color:var(--accent)"></div>
    <div class="ebtns">
      <button class="ghost" id="editImage">画像を設定</button>
      <button class="ghost" id="editImageClear">画像を外す</button>
      <button class="ghost" id="editDetail">📖 スキル詳細</button>
    </div>
    <p class="mfoot"><button id="editClose" class="small">閉じる</button></p>
  </div>
</div>

<script src="carddb.js"></script>
<script>
"use strict";

/* ===== ここから計算ロジック（PC版と共通・保存データも共有） ===== */

const COLORS = ["赤", "青", "緑", "黄", "紫"];
const SUB_COLORS = ["なし", ...COLORS];
const AFFINITY = {
  赤: { 緑: 2, 青: 0.5 }, 青: { 赤: 2, 緑: 0.5 }, 緑: { 青: 2, 赤: 0.5 },
  黄: { 紫: 2 }, 紫: { 黄: 2 },
};
const SHIELDS = {
  "盾なし": [], "全盾": COLORS,
  "赤": ["赤"], "青": ["青"], "緑": ["緑"], "黄": ["黄"], "紫": ["紫"],
  "赤青緑": ["赤", "青", "緑"], "赤黄紫": ["赤", "黄", "紫"],
  "青黄紫": ["青", "黄", "紫"], "緑黄紫": ["緑", "黄", "紫"],
};
const STORAGE_KEY = "puyoquest-damage-calc-v1";
const COLOR_NUM = { 1: "赤", 2: "青", 3: "緑", 4: "黄", 5: "紫" };
const hasDB = typeof CARD_DB !== "undefined";

function sampleState() {
  const emptyCells = () => Array.from({ length: 6 }, () => ({ m: "", s: "" }));
  return {
    deckName: "",
    cards: Array.from({ length: 6 }, () => ({ name: "", atk: 0, main: "赤", sub: "なし", img: "", combo: false })),
    enemyColor: "緑", enemyShield: "盾なし",
    supportAtk: 500, coefMain: 3, coefSub: 1,
    rows: [
      { name: "リーダースキル", on: true, cells: emptyCells() },
      { name: "サポートリーダー", on: true, cells: emptyCells() },
    ],
  };
}
let state = loadState();
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* 壊れた保存データは無視 */ }
  return sampleState();
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    alert("保存に失敗しました。画像が大きすぎる可能性があります。");
  }
}

function affinity(color, enemy) {
  if (!color || color === "なし") return 0;
  return (AFFINITY[color] && AFFINITY[color][enemy]) ?? 1;
}
function shieldMult(color) {
  if (!color || color === "なし") return 0;
  return SHIELDS[state.enemyShield].includes(color) ? 0.01 : 1;
}
function cellValue(str) {
  const v = parseFloat(str);
  return isNaN(v) ? 1 : v;
}
function calc() {
  const results = state.cards.map((card, i) => {
    const hasSub = card.sub && card.sub !== "なし";
    const base = (Number(card.atk) || 0) + (Number(state.supportAtk) || 0);
    let m = base * (Number(state.coefMain) || 0);
    let s = hasSub ? base * (Number(state.coefSub) || 0) : 0;
    for (const row of state.rows) {
      if (!row.on) continue;
      m *= cellValue(row.cells[i].m);
      if (hasSub) s *= cellValue(row.cells[i].s);
    }
    const affM = affinity(card.main, state.enemyColor);
    const affS = hasSub ? affinity(card.sub, state.enemyColor) : 0;
    m *= affM * shieldMult(card.main);
    s *= affS * (hasSub ? shieldMult(card.sub) : 0);
    return { m, s, affM, affS, hasSub };
  });
  const totalMain = results.reduce((a, r) => a + r.m, 0);
  const total = results.reduce((a, r) => a + r.m + r.s, 0);
  return { results, totalMain, total };
}

const $ = (sel) => document.querySelector(sel);
function fmt(n) { return Math.round(n).toLocaleString("ja-JP"); }
function fmtUnit(n) {
  const units = [[1e12, "兆"], [1e8, "億"], [1e4, "万"]];
  for (const [u, label] of units) {
    if (n >= u) {
      const v = n / u;
      const s = v >= 100 ? Math.round(v).toLocaleString("ja-JP") : v >= 10 ? v.toFixed(1) : v.toFixed(2);
      return s + label;
    }
  }
  return Math.round(n).toLocaleString("ja-JP");
}
function colorBadge(c) { return `<span class="badge c${c}">${c}</span>`; }

function skillRangeMatches(range, srcColor, target) {
  if (!range || range.includes("全体")) return true;
  if (range.includes("同色")) return target.main === srcColor;
  const colors = COLORS.filter((col) => range.includes(col));
  if (colors.length) return colors.includes(target.main);
  return true;
}
function applySkillRows(slot, c) {
  if (slot === 0 || slot === 5) {
    const rowName = slot === 0 ? "リーダースキル" : "サポートリーダー";
    let row = state.rows.find((r) => r.name === rowName);
    if (!row) {
      row = { name: rowName, on: true, cells: Array.from({ length: 6 }, () => ({ m: "", s: "" })) };
      state.rows.unshift(row);
    }
    row.ls = (c.lm && c.lm[1]) ? { v: c.lm[1], r: c.lr || "", slot } : undefined;
    row.info = { card: c.n, img: c.u || "", txt: c.ls || "" };
  }
  state.rows = state.rows.filter((r) => r.auto !== slot);
  for (const s of c.sk || []) {
    state.rows.push({
      name: s.k, on: true, auto: slot,
      sk: { v: s.v, r: s.r || "" },
      info: { card: c.n, img: c.u || "", txt: s.t || "" },
      cells: [],
    });
  }
  refreshAutoRows();
}
function refreshAutoRows() {
  for (const row of state.rows) {
    const info = row.sk || row.ls;
    if (!info) continue;
    const slot = row.sk ? row.auto : row.ls.slot;
    const srcColor = state.cards[slot].main;
    row.cells = state.cards.map((cd, j) => {
      let hit;
      if (info.r === "自身のみ") hit = j === slot;
      else if (info.r === "隣接") hit = Math.abs(j - slot) <= 1;
      else hit = skillRangeMatches(info.r, srcColor, cd);
      const v = hit ? String(info.v) : "";
      return { m: v, s: v };
    });
  }
  refreshAilmentRow();
  refreshComboRow();
}
function refreshAilmentRow() {
  const all = [];
  state.cards.forEach((cd) => {
    (cd.ail || []).forEach((a) => all.push({ ...a, card: cd.name, img: cd.img }));
  });
  let row = state.rows.find((r) => r.st);
  if (all.length === 0) {
    if (row) state.rows = state.rows.filter((r) => !r.st);
    return;
  }
  const best = all.reduce((a, b) => (b.v > a.v ? b : a));
  if (!row) {
    row = { name: "", on: true, st: true, cells: [] };
    state.rows.push(row);
  }
  row.name = `状態異常:${best.k}`;
  row.info = {
    card: best.card, img: best.img || "",
    txt: `このデッキが敵に付与できる状態異常：\n` +
      all.map((a) => `・${a.k}（被ダメージ×${a.v}）… ${a.card}`).join("\n") +
      `\n\n※複数の状態異常は倍率の高いものだけが適用されます。この行には最大の×${best.v}が入っています。`,
  };
  row.cells = state.cards.map(() => ({ m: String(best.v), s: String(best.v) }));
}
function refreshComboRow() {
  let row = state.rows.find((r) => r.combo);
  const targets = state.cards.filter((c) => c.combo);
  if (targets.length === 0) {
    if (row) state.rows = state.rows.filter((r) => !r.combo);
    return;
  }
  if (!row) {
    row = { name: "コンビネーション", on: true, combo: true, cells: [] };
    state.rows.push(row);
  }
  row.info = {
    card: "✨マークのカード", img: "",
    txt: `コンビネーションボーナス：✨を付けたカードの攻撃力を1.2倍にします。\n\n対象カード：\n` +
      targets.map((c) => `・${c.name || "（無名）"}`).join("\n"),
  };
  row.cells = state.cards.map((c) => (c.combo ? { m: "1.2", s: "1.2" } : { m: "", s: "" }));
}
function dbLookup(card) {
  if (!hasDB || !card.name) return null;
  const m = card.name.match(/^\[★(\d)\]\s*(.+)$/);
  const rarity = m ? m[1] : null;
  const n = m ? m[2] : card.name;
  return CARD_DB.find((c) => c.n === n && (!rarity || c.r === rarity)) || null;
}

/* ===== ここから スマホ版の画面 ===== */

// タブ切り替え
document.querySelectorAll(".tabbar button").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabbar button").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    btn.classList.add("active");
    $("#tab-" + btn.dataset.tab).classList.add("active");
    renderAll();
  });
});

// ヘッダー
function renderHeader() {
  const dn = $("#deckName");
  if (document.activeElement !== dn) dn.value = state.deckName || "";
  $("#totalBig").textContent = fmtUnit(calc().total);
}
$("#deckName").addEventListener("input", () => {
  state.deckName = $("#deckName").value;
  saveState();
});

// デッキ帯
function renderStrip() {
  const box = $("#deckStrip");
  box.innerHTML = "";
  const labels = { 0: "リーダー", 5: "サポート" };
  state.cards.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = "dcard" + (i === 0 || i === 5 ? " lead" : "");
    const imgBox = document.createElement("div");
    imgBox.className = "dimg";
    if (card.img) {
      const img = document.createElement("img");
      img.src = card.img;
      imgBox.appendChild(img);
    } else {
      imgBox.innerHTML = `<span class="dph">${i + 1}</span>`;
    }
    div.appendChild(imgBox);
    const label = document.createElement("div");
    label.className = "dlabel";
    label.textContent = labels[i] || "";
    div.appendChild(label);
    if (card.combo) {
      const star = document.createElement("span");
      star.className = "dstar";
      star.textContent = "✨";
      div.appendChild(star);
    }
    div.addEventListener("click", () => openEdit(i));
    box.appendChild(div);
  });
}

// カードグリッド
function renderGallery() {
  const box = $("#gallery");
  box.innerHTML = "";
  const { results } = calc();
  state.cards.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = "gcard";

    const imgBox = document.createElement("div");
    imgBox.className = "gimg";
    if (card.img) {
      const img = document.createElement("img");
      img.src = card.img;
      imgBox.appendChild(img);
    } else {
      imgBox.innerHTML = `<span class="ph">タップして<br>カードを設定</span>`;
    }
    imgBox.addEventListener("click", () => openEdit(i));
    div.appendChild(imgBox);

    const comboBtn = document.createElement("button");
    comboBtn.textContent = "✨";
    comboBtn.className = "gcombo" + (card.combo ? " on" : "");
    comboBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      card.combo = !card.combo;
      refreshAutoRows();
      renderAll();
      saveState();
    });
    div.appendChild(comboBtn);

    const hasSub = card.sub && card.sub !== "なし";
    const name = document.createElement("div");
    name.className = "gname";
    name.innerHTML = `${colorBadge(card.main)}${hasSub ? colorBadge(card.sub) : ""} ${card.name || "（無名）"} <span style="color:var(--sub)">📖</span>`;
    name.addEventListener("click", () => openCardModal(i));
    div.appendChild(name);

    const dmg = document.createElement("div");
    dmg.className = "gdmg";
    const r = results[i];
    dmg.textContent = r ? fmtUnit(r.m + r.s) : "-";
    dmg.addEventListener("click", () => openDmgModal(i));
    div.appendChild(dmg);

    box.appendChild(div);
  });
}

// 倍率リスト
const openRows = new Set(); // 開いている行（見た目の状態）
function rowSummary(row) {
  const vals = [...new Set(row.cells.flatMap((c) => [c.m, c.s]).filter((v) => v !== ""))];
  if (vals.length === 0) return "—";
  if (vals.length === 1) return "×" + vals[0];
  return "×" + vals.join(" / ×");
}
function renderRows() {
  const box = $("#rowList");
  box.innerHTML = "";
  state.rows.forEach((row, ri) => {
    const item = document.createElement("div");
    item.className = "rowitem" + (row.on ? "" : " off") + (openRows.has(ri) ? " openbody" : "");

    const head = document.createElement("div");
    head.className = "rowhead";

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.className = "rswitch";
    chk.checked = row.on;
    chk.addEventListener("click", (e) => e.stopPropagation());
    chk.addEventListener("change", () => {
      row.on = chk.checked;
      renderAll();
      saveState();
    });
    head.appendChild(chk);

    if (row.info && row.info.img) {
      const icon = document.createElement("img");
      icon.className = "rowicon";
      icon.src = row.info.img;
      head.appendChild(icon);
    }

    const rname = document.createElement("div");
    rname.className = "rname";
    rname.textContent = row.name;
    head.appendChild(rname);

    if (row.info && row.info.txt) {
      const q = document.createElement("button");
      q.textContent = "？";
      q.className = "small";
      q.addEventListener("click", (e) => {
        e.stopPropagation();
        openSkillModal(`${row.name}（${row.info.card}）`, row.info.txt);
      });
      head.appendChild(q);
    }

    const rval = document.createElement("div");
    rval.className = "rval";
    rval.textContent = rowSummary(row);
    head.appendChild(rval);

    const arrow = document.createElement("span");
    arrow.className = "arrow";
    arrow.textContent = openRows.has(ri) ? "▲" : "▼";
    head.appendChild(arrow);

    head.addEventListener("click", () => {
      if (openRows.has(ri)) openRows.delete(ri); else openRows.add(ri);
      renderRows();
    });
    item.appendChild(head);

    // 開いたときの編集エリア
    const body = document.createElement("div");
    body.className = "rowbody";
    state.cards.forEach((card, ci) => {
      const line = document.createElement("div");
      line.className = "cline";
      if (card.img) {
        const im = document.createElement("img");
        im.src = card.img;
        line.appendChild(im);
      }
      const cn = document.createElement("span");
      cn.className = "cn";
      cn.textContent = `${ci + 1}. ${card.name || "（無名）"}`;
      line.appendChild(cn);
      const hasSub = card.sub && card.sub !== "なし";
      for (const key of ["m", "s"]) {
        const input = document.createElement("input");
        input.type = "number";
        input.step = "0.1";
        input.className = "cell";
        input.placeholder = key === "m" ? "主" : "副";
        input.value = row.cells[ci][key];
        if (key === "s" && !hasSub) input.disabled = true;
        input.addEventListener("input", () => {
          row.cells[ci][key] = input.value;
          delete row.sk; delete row.ls; delete row.st; delete row.combo;
          renderHeader();
          saveState();
        });
        line.appendChild(input);
      }
      body.appendChild(line);
    });

    const tools = document.createElement("div");
    tools.className = "rowtools";
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = row.name;
    nameInput.addEventListener("input", () => { row.name = nameInput.value; saveState(); });
    const allInput = document.createElement("input");
    allInput.type = "number";
    allInput.step = "0.1";
    allInput.className = "cell";
    allInput.placeholder = "全体";
    const applyBtn = document.createElement("button");
    applyBtn.textContent = "全体に反映";
    applyBtn.className = "small";
    applyBtn.addEventListener("click", () => {
      row.cells.forEach((cell) => { cell.m = allInput.value; cell.s = allInput.value; });
      delete row.sk; delete row.ls; delete row.st; delete row.combo;
      renderAll();
      saveState();
    });
    const delBtn = document.createElement("button");
    delBtn.textContent = "行を削除";
    delBtn.className = "small danger";
    delBtn.addEventListener("click", () => {
      if (!confirm(`「${row.name}」の行を削除しますか？`)) return;
      state.rows.splice(ri, 1);
      openRows.delete(ri);
      renderAll();
      saveState();
    });
    tools.append(nameInput, allInput, applyBtn, delBtn);
    body.appendChild(tools);
    item.appendChild(body);

    box.appendChild(item);
  });
}

let multSortAsc = true;
$("#sortBtn").addEventListener("click", () => {
  const pinnedNames = ["リーダースキル", "サポートリーダー"];
  const pinned = state.rows.filter((r) => pinnedNames.includes(r.name));
  const rest = state.rows.filter((r) => !pinnedNames.includes(r.name));
  rest.sort((a, b) => (multSortAsc ? 1 : -1) * a.name.localeCompare(b.name, "ja"));
  multSortAsc = !multSortAsc;
  state.rows = [...pinned, ...rest];
  openRows.clear();
  renderRows();
  saveState();
});
$("#addRowBtn").addEventListener("click", () => {
  state.rows.push({ name: "新しい倍率", on: true, cells: Array.from({ length: 6 }, () => ({ m: "", s: "" })) });
  openRows.add(state.rows.length - 1);
  renderRows();
  saveState();
});

// 設定タブ
function renderSettings() {
  const box = $("#enemyColors");
  box.innerHTML = "";
  const bg = { 赤: "var(--red)", 青: "var(--blue)", 緑: "var(--green)", 黄: "var(--yellow)", 紫: "var(--purple)" };
  COLORS.forEach((c) => {
    const b = document.createElement("button");
    b.textContent = c;
    b.style.background = bg[c];
    if (c === "黄") b.style.color = "#333";
    b.className = state.enemyColor === c ? "sel" : "";
    b.addEventListener("click", () => {
      state.enemyColor = c;
      renderAll();
      saveState();
    });
    box.appendChild(b);
  });

  const es = $("#enemyShield");
  es.innerHTML = "";
  Object.keys(SHIELDS).forEach((s) => es.appendChild(new Option(s, s, false, s === state.enemyShield)));
  es.onchange = () => { state.enemyShield = es.value; renderHeader(); saveState(); };

  for (const [id, key] of [["#supportAtk", "supportAtk"], ["#coefMain", "coefMain"], ["#coefSub", "coefSub"]]) {
    const el = $(id);
    el.value = state[key];
    el.oninput = () => { state[key] = Number(el.value) || 0; renderHeader(); saveState(); };
  }
}
$("#resetBtn").addEventListener("click", () => {
  if (!confirm("入力内容をすべて消して初期状態に戻します。よろしいですか？")) return;
  state = sampleState();
  openRows.clear();
  saveState();
  renderAll();
});

/* ===== モーダル類 ===== */

function closeModal(id) { $(id).classList.remove("open"); }
["searchModal", "skillModal", "cardModal", "editModal"].forEach((id) => {
  $("#" + id).addEventListener("click", (e) => { if (e.target.id === id) closeModal("#" + id); });
});
$("#searchClose").addEventListener("click", () => closeModal("#searchModal"));
$("#skillClose").addEventListener("click", () => closeModal("#skillModal"));
$("#cardClose").addEventListener("click", () => closeModal("#cardModal"));
$("#editClose").addEventListener("click", () => closeModal("#editModal"));

function openSkillModal(title, text) {
  $("#skillModalTitle").textContent = title;
  $("#skillModalBody").textContent = text;
  $("#skillModal").classList.add("open");
}

function openDmgModal(i) {
  const card = state.cards[i];
  const { results } = calc();
  const r = results[i];
  $("#skillModalTitle").textContent = `${card.name || "（無名）"} のダメージ`;
  $("#skillModalBody").innerHTML =
    `<table style="width:100%; border-collapse:collapse; margin-top:4px">` +
    `<tr><td>主属性 ${colorBadge(card.main)}</td><td style="text-align:right">${fmt(r.m)}</td><td style="text-align:right; color:var(--accent); font-weight:700">${fmtUnit(r.m)}</td></tr>` +
    (r.hasSub ? `<tr><td>副属性 ${colorBadge(card.sub)}</td><td style="text-align:right">${fmt(r.s)}</td><td style="text-align:right; color:var(--accent); font-weight:700">${fmtUnit(r.s)}</td></tr>` : "") +
    `<tr><td><strong>合計</strong></td><td style="text-align:right"><strong>${fmt(r.m + r.s)}</strong></td><td style="text-align:right; color:var(--accent); font-weight:700">${fmtUnit(r.m + r.s)}</td></tr>` +
    `</table>` +
    `<p style="margin:10px 0 0; font-size:12px; color:var(--sub)">属性相性: 主×${r.affM}${r.hasSub ? ` ／ 副×${r.affS}` : ""}（敵は${state.enemyColor}属性）</p>`;
  $("#skillModal").classList.add("open");
}

function openCardModal(i) {
  const saved = state.cards[i];
  const db = dbLookup(saved) || {};
  const card = {
    ...saved,
    ns: saved.ns || db.ns || "", ls: saved.ls || db.ls || "",
    fp: saved.fp || db.fp || "", ts: saved.ts || db.ts || "",
    ab: saved.ab || db.ab || "", ga: saved.ga || db.ga || "",
  };
  const hasSub = card.sub && card.sub !== "なし";
  const role = i === 0 ? "リーダー" : i === 5 ? "サポート" : "";
  $("#cardModalHead").innerHTML =
    (card.img ? `<img src="${card.img}" alt="">` : "") +
    `<div><div style="font-weight:700; font-size:15px">${card.name || "（無名）"}</div>` +
    `<div style="margin-top:4px">${colorBadge(card.main)}${hasSub ? colorBadge(card.sub) : ""}` +
    `${role ? ` <span class="badge" style="background:var(--accent)">${role}</span>` : ""}</div></div>`;
  const secs = [];
  if ((i === 0 || i === 5) && card.ls) secs.push(["リーダースキル", card.ls, ""]);
  if (card.ns) secs.push(["スキル", card.ns, ""]);
  if (card.fp) secs.push(["フルパワー", card.fp, "sub"]);
  if (card.ts) secs.push(["とくもり", card.ts, "sub"]);
  if (card.ab) secs.push(["アビリティ", card.ab, "sub"]);
  if (card.ga) secs.push(["きらめきオーラ", card.ga, "sub"]);
  $("#cardModalBody").innerHTML = secs.length
    ? secs.map(([k, v, cls]) => `<div class="cm-label ${cls}">${k}</div><div class="cm-text">${v}</div>`).join("")
    : `<p style="margin-top:12px; font-size:13px; color:var(--sub)">スキル情報がありません。「カードDBから選ぶ」で選ぶと表示されます。</p>`;
  $("#cardModal").classList.add("open");
}

/* カード編集モーダル */
const filePicker = document.createElement("input");
filePicker.type = "file";
filePicker.accept = "image/*";
let pickerTarget = 0;
filePicker.addEventListener("change", () => {
  const file = filePicker.files[0];
  filePicker.value = "";
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const MAX = 400;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(img.src);
    state.cards[pickerTarget].img = canvas.toDataURL("image/png");
    renderAll();
    saveState();
  };
  img.src = URL.createObjectURL(file);
});

let editTarget = 0;
function openEdit(i) {
  editTarget = i;
  const card = state.cards[i];
  const role = i === 0 ? "（リーダー）" : i === 5 ? "（サポート）" : "";
  $("#editTitle").textContent = `${i + 1}枚目のカード ${role}`;
  $("#editName").value = card.name;
  $("#editAtk").value = card.atk || "";
  const mainSel = $("#editMain"), subSel = $("#editSub");
  mainSel.innerHTML = ""; subSel.innerHTML = "";
  COLORS.forEach((c) => mainSel.appendChild(new Option(c, c, false, c === card.main)));
  SUB_COLORS.forEach((c) => subSel.appendChild(new Option(c, c, false, c === card.sub)));
  $("#editCombo").checked = !!card.combo;
  $("#editModal").classList.add("open");
}
$("#editName").addEventListener("input", () => { state.cards[editTarget].name = $("#editName").value; renderHeader(); saveState(); });
$("#editAtk").addEventListener("input", () => { state.cards[editTarget].atk = Number($("#editAtk").value) || 0; renderHeader(); saveState(); });
$("#editMain").addEventListener("change", () => { state.cards[editTarget].main = $("#editMain").value; refreshAutoRows(); renderHeader(); saveState(); });
$("#editSub").addEventListener("change", () => { state.cards[editTarget].sub = $("#editSub").value; refreshAutoRows(); renderHeader(); saveState(); });
$("#editCombo").addEventListener("change", () => { state.cards[editTarget].combo = $("#editCombo").checked; refreshAutoRows(); renderHeader(); saveState(); });
$("#editImage").addEventListener("click", () => { pickerTarget = editTarget; filePicker.click(); });
$("#editImageClear").addEventListener("click", () => { state.cards[editTarget].img = ""; renderAll(); saveState(); });
$("#editDetail").addEventListener("click", () => openCardModal(editTarget));
$("#editSearch").addEventListener("click", () => openSearch(editTarget));
$("#editClose").addEventListener("click", () => { closeModal("#editModal"); renderAll(); });

/* カード検索 */
let searchTarget = 0;
function openSearch(i) {
  searchTarget = i;
  $("#searchModal").classList.add("open");
  const input = $("#searchInput");
  input.value = "";
  $("#searchResults").innerHTML = `<p style="font-size:12px; color:var(--sub)">カード名の一部を入力してください（${hasDB ? CARD_DB.length : 0}件収録）</p>`;
  input.focus();
}
$("#searchInput").addEventListener("input", () => {
  if (!hasDB) return;
  const q = $("#searchInput").value.trim();
  const box = $("#searchResults");
  box.innerHTML = "";
  if (!q) return;
  const hits = CARD_DB.filter((c) => c.n.includes(q)).slice(0, 30);
  if (hits.length === 0) {
    box.innerHTML = '<p style="font-size:12px; color:var(--sub)">見つかりませんでした</p>';
    return;
  }
  hits.forEach((c) => {
    const div = document.createElement("div");
    div.className = "sitem";
    const main = COLOR_NUM[c.m];
    const sub = COLOR_NUM[c.s];
    div.innerHTML =
      `<img src="${c.u}" alt="" loading="lazy">` +
      `<div style="text-align:left"><div>★${c.r} ${c.n}</div>` +
      `<div>${main ? colorBadge(main) : ""}${sub ? colorBadge(sub) : ""} <span style="font-size:11px; color:var(--sub)">${c.t || ""}${c.a ? `　攻撃${c.a}${c.x ? "（とっくんなし）" : ""}` : ""}${c.w ? "　[Wiki]" : ""}</span></div></div>`;
    div.addEventListener("click", () => pickCard(c));
    box.appendChild(div);
  });
});
function pickCard(c) {
  const card = state.cards[searchTarget];
  card.name = `[★${c.r}] ${c.n}`;
  card.main = COLOR_NUM[c.m] || "赤";
  card.sub = COLOR_NUM[c.s] || "なし";
  card.img = c.u;
  if (c.a) card.atk = c.a;
  card.ns = c.ns || ""; card.ls = c.ls || "";
  card.fp = c.fp || ""; card.ts = c.ts || "";
  card.ab = c.ab || ""; card.ga = c.ga || "";
  card.ail = c.ail || [];
  applySkillRows(searchTarget, c);
  closeModal("#searchModal");
  closeModal("#editModal");
  renderAll();
  saveState();
}

/* ===== 全体描画 ===== */
function renderAll() {
  renderHeader();
  renderStrip();
  renderGallery();
  renderRows();
  renderSettings();
}
renderAll();
</script>
