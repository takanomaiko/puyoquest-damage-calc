<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カード図鑑 - ぷよクエ ダメージ計算機</title>
<style>
  :root {
    --red: #e74c3c; --blue: #3498db; --green: #27ae60; --yellow: #f1c40f; --purple: #9b59b6;
    --bg: #eef1f8; --border: #e3e8f3; --text: #2b3550; --sub: #8590a6;
    --accent: #5b6ee1; --accent-2: #7d5fe8;
    --grad: linear-gradient(135deg, var(--accent), var(--accent-2));
    --shadow-sm: 0 1px 2px rgba(35, 45, 90, .06);
    --shadow-md: 0 2px 6px rgba(35, 45, 90, .08), 0 12px 28px -14px rgba(35, 45, 90, .18);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    background: linear-gradient(180deg, #e9edf7 0%, var(--bg) 280px); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 10; background: var(--grad); color: #fff; padding: 10px 12px;
    box-shadow: 0 2px 12px rgba(70, 80, 180, .28);
  }
  header h1 { font-size: 15px; margin: 0 0 8px; display: flex; justify-content: space-between; align-items: center; letter-spacing: .03em; }
  header h1 a { color: #fff; font-size: 12px; font-weight: normal; }
  .controls { display: flex; gap: 6px; flex-wrap: wrap; }
  .controls input, .controls select {
    font-size: 14px; padding: 7px 9px; border: none; border-radius: 9px; color: var(--text);
  }
  .controls input:focus, .controls select:focus { outline: none; box-shadow: 0 0 0 3px rgba(255, 255, 255, .45); }
  .controls input { flex: 1; min-width: 10em; }
  main { max-width: 720px; margin: 0 auto; padding: 10px; }
  #count { font-size: 12px; color: var(--sub); margin: 6px 2px 8px; }
  .item {
    background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 7px; overflow: hidden;
    box-shadow: var(--shadow-sm); transition: box-shadow .15s;
  }
  .item:hover { box-shadow: var(--shadow-md); }
  .ihead { display: flex; align-items: center; gap: 10px; padding: 9px 11px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ihead img { width: 44px; height: 44px; object-fit: contain; flex: none; border-radius: 6px; }
  .iinfo { flex: 1; min-width: 0; }
  .iname { font-size: 13px; font-weight: 700; }
  .imeta { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .iatk { flex: none; text-align: right; font-size: 13px; font-weight: 700; color: var(--accent); }
  .iatk small { display: block; font-weight: normal; color: var(--sub); font-size: 10px; }
  .badge { display: inline-block; padding: 0 6px; border-radius: 999px; color: #fff; font-size: 10px; font-weight: 700; }
  .c赤 { background: var(--red); } .c青 { background: var(--blue); } .c緑 { background: var(--green); }
  .c黄 { background: var(--yellow); color: #333; } .c紫 { background: var(--purple); }
  .ibody { display: none; border-top: 1px solid var(--border); padding: 10px 12px; background: #fafbfe; font-size: 12px; line-height: 1.7; }
  .item.open .ibody { display: block; }
  .lbl { display: inline-block; font-size: 11px; font-weight: 700; color: #fff; background: var(--accent); padding: 1px 8px; border-radius: 8px; margin: 8px 0 2px; }
  .lbl.sub { background: #8a93a8; }
  .skrow { font-size: 12px; margin: 2px 0; }
  .skcats { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .editrow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .editrow input { width: 5.5em; font-size: 13px; padding: 5px 6px; border: 1px solid var(--border); border-radius: 7px; text-align: right; }
  .editrow button { font-size: 12px; padding: 5px 10px; border: none; border-radius: 8px; background: var(--grad); color: #fff; font-weight: 600; cursor: pointer; }
  .editrow .ereset { background: #8a93a8; }
  .edithint { font-size: 11px; color: var(--sub); margin-top: 3px; }
  #moreBtn {
    display: block; width: 100%; padding: 12px; margin: 8px 0 20px; background: var(--grad); color: #fff;
    border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(91, 110, 225, .3); transition: filter .15s, transform .1s;
  }
  #moreBtn:active { transform: translateY(1px); filter: brightness(.95); }
  .dl { text-align: center; font-size: 12px; margin: 12px 0 30px; color: var(--sub); }
  .dl a { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>カード図鑑（<span id="total">-</span>枚収録） <a href="mobile.html">← 計算機に戻る</a></h1>
  <div class="controls">
    <input type="text" id="q" placeholder="カード名で検索">
    <select id="fColor">
      <option value="">全属性</option>
      <option>赤</option><option>青</option><option>緑</option><option>黄</option><option>紫</option>
    </select>
    <select id="fRarity">
      <option value="">全レア</option>
      <option value="7">★7</option><option value="6">★6</option><option value="5">★5</option>
    </select>
    <select id="fType">
      <option value="">全タイプ</option>
      <option>こうげき</option><option>たいりょく</option><option>かいふく</option><option>バランス</option>
    </select>
    <select id="fSrc">
      <option value="">全出典</option>
      <option value="sheet">シート</option>
      <option value="wiki">Wiki</option>
    </select>
    <select id="fSkill">
      <option value="">全スキル分類</option>
    </select>
  </div>
</header>

<main>
  <div id="count"></div>
  <div id="list"></div>
  <button id="moreBtn" style="display:none">さらに表示</button>
  <p class="dl">表計算ソフト用: <a href="carddb.csv" download>carddb.csv をダウンロード</a><br>
  （Googleスプレッドシートの「ファイル→インポート」で開けます）</p>
</main>

<script src="carddb.js"></script>
<script>
"use strict";
const $ = (s) => document.querySelector(s);
const COLOR_NUM = { 1: "赤", 2: "青", 3: "緑", 4: "黄", 5: "紫" };
const badge = (c) => c ? `<span class="badge c${c}">${c}</span>` : "";

// ---------- 自分で修正したステータス（攻撃・体力・回復） ----------
// このブラウザにだけ保存され、計算機の検索でも修正後の値が使われる
const DB_OV_KEY = "puyoquest_db_overrides";
function loadDbOv() {
  try { return JSON.parse(localStorage.getItem(DB_OV_KEY)) || {}; } catch (e) { return {}; }
}
function applyDbOv() {
  const ov = loadDbOv();
  for (const c of CARD_DB) {
    const o = ov[c.n + "|" + c.r];
    if (!o) continue;
    if (o.a != null) c.a = o.a;
    if (o.h != null) c.h = o.h;
    if (o.c != null) c.c = o.c;
    delete c.x;  // 自分で入れた値なので「とっくんなし」表示は消す
    c.edited = 1;
  }
}
applyDbOv();

$("#total").textContent = CARD_DB.length.toLocaleString("ja-JP");

// スキル分類のプルダウンを組み立てる（ゲーム内スキル検索と同じグループ・並び順）
SKILL_CAT_GROUPS.forEach(([group, ids]) => {
  const og = document.createElement("optgroup");
  og.label = group;
  ids.forEach((i) => og.appendChild(new Option(SKILL_CATS[i], i)));
  $("#fSkill").appendChild(og);
});
const catNames = (ids) => (ids || []).map((i) => SKILL_CATS[i]).join("、");

let shown = 0;
let current = [];
const PAGE = 60;

function filterCards() {
  const q = $("#q").value.trim();
  const fc = $("#fColor").value;
  const fr = $("#fRarity").value;
  const ft = $("#fType").value;
  const fs = $("#fSrc").value;
  const fsk = $("#fSkill").value;
  return CARD_DB.filter((c) => {
    if (q && !c.n.includes(q)) return false;
    if (fc && COLOR_NUM[c.m] !== fc && COLOR_NUM[c.s] !== fc) return false;
    if (fr && c.r !== fr) return false;
    if (ft && c.t !== ft) return false;
    if (fs === "wiki" && !c.w) return false;
    if (fs === "sheet" && c.w) return false;
    // スキル分類: 通常スキル(sc)/フルパワー(fc)/ダブルパワー(wc)のどれかに含まれていればヒット
    if (fsk !== "" && !((c.sc || []).includes(+fsk) || (c.fc || []).includes(+fsk) || (c.wc || []).includes(+fsk))) return false;
    return true;
  });
}

function detailHTML(c) {
  const secs = [];
  if (c.sk && c.sk.length) {
    secs.push(`<div class="lbl">倍率スキル（自動入力される行）</div>` +
      c.sk.map((s) => `<div class="skrow">・${s.k} <strong>×${s.v || "?"}</strong>（${s.r || "味方全体"}）${s.o === "LS" ? "※リーダー/サポート時のみ" : ""}</div>`).join(""));
  }
  if (c.ail && c.ail.length) {
    secs.push(`<div class="lbl">付与できる状態異常</div><div class="skrow">` +
      c.ail.map((a) => `${a.k}（被ダメ×${a.v}）${a.o === "LS" ? "※リーダー時" : ""}`).join("、") + `</div>`);
  }
  if (c.lm) secs.push(`<div class="lbl">リーダースキル倍率</div><div class="skrow">攻撃×${c.lm[1]}（${c.lr || "味方全体"}）</div>`);
  if (c.ls) secs.push(`<div class="lbl sub">リーダースキル</div><div>${c.ls}</div>`);
  if (c.ns) secs.push(`<div class="lbl sub">スキル</div><div>${c.ns}` +
    (c.sc ? `<div class="skcats">分類: ${catNames(c.sc)}</div>` : "") + `</div>`);
  if (c.fp) secs.push(`<div class="lbl sub">フルパワー</div><div>${c.fp}` +
    (c.fc ? `<div class="skcats">分類: ${catNames(c.fc)}</div>` : "") + `</div>`);
  if (c.wp) secs.push(`<div class="lbl sub">ダブルパワー</div><div>${c.wp}` +
    (c.wc ? `<div class="skcats">分類: ${catNames(c.wc)}</div>` : "") + `</div>`);
  if (c.ts) secs.push(`<div class="lbl sub">とくもり</div><div>${c.ts}</div>`);
  if (c.ab) secs.push(`<div class="lbl sub">アビリティ</div><div>${c.ab}</div>`);
  if (c.ga) secs.push(`<div class="lbl sub">きらめきオーラ</div><div>${c.ga}</div>`);
  // ステータス修正フォーム（保存はこのブラウザ内だけ・計算機の検索にも反映）
  secs.push(
    `<div class="lbl sub">ステータス修正 ✏️</div>` +
    `<div class="editrow">` +
    `攻撃 <input type="number" class="ea" value="${c.a ?? ""}"> ` +
    `体力 <input type="number" class="eh" value="${c.h ?? ""}"> ` +
    `回復 <input type="number" class="ec" value="${c.c ?? ""}"> ` +
    `<button class="esave">保存</button>` +
    (c.edited ? ` <button class="ereset">元の値に戻す</button>` : "") +
    `</div>` +
    `<div class="edithint">このブラウザにだけ保存され、計算機の検索でも修正後の値が使われます。</div>`);
  return secs.join("") || "詳細データなし";
}

// 修正フォームの保存・リセットのボタンを動かす
function wireEdit(item, c) {
  const box = item.querySelector(".ibody");
  box.querySelector(".esave").addEventListener("click", () => {
    const num = (cls) => { const v = box.querySelector(cls).value; return v === "" ? null : +v; };
    const o = { a: num(".ea"), h: num(".eh"), c: num(".ec") };
    const ov = loadDbOv();
    ov[c.n + "|" + c.r] = o;
    localStorage.setItem(DB_OV_KEY, JSON.stringify(ov));
    if (o.a != null) c.a = o.a;
    if (o.h != null) c.h = o.h;
    if (o.c != null) c.c = o.c;
    delete c.x;
    c.edited = 1;
    refresh();  // 一覧の表示を新しい値に更新
  });
  const resetBtn = box.querySelector(".ereset");
  if (resetBtn) resetBtn.addEventListener("click", () => {
    if (!confirm(`「${c.n}」の修正を消して元の値に戻します。よろしいですか？`)) return;
    const ov = loadDbOv();
    delete ov[c.n + "|" + c.r];
    localStorage.setItem(DB_OV_KEY, JSON.stringify(ov));
    location.reload();  // 元の値はDBから読み直す
  });
}

function renderMore() {
  const list = $("#list");
  const slice = current.slice(shown, shown + PAGE);
  slice.forEach((c) => {
    const item = document.createElement("div");
    item.className = "item";
    const atk = c.a ? `${c.a.toLocaleString("ja-JP")}<small>${c.edited ? "✏️自分で修正" : c.x ? "とっくんなし" : "とっくん込み"}</small>` : "";
    item.innerHTML =
      `<div class="ihead">` +
      (c.u ? `<img src="${c.u}" loading="lazy" alt="">` : "") +
      `<div class="iinfo"><div class="iname">★${c.r} ${c.n}</div>` +
      `<div class="imeta">${badge(COLOR_NUM[c.m])}${badge(COLOR_NUM[c.s])} ${c.t || ""}${c.w ? "　[Wiki]" : ""}</div></div>` +
      `<div class="iatk">${atk}</div></div>` +
      `<div class="ibody"></div>`;
    item.querySelector(".ihead").addEventListener("click", () => {
      if (!item.classList.contains("open")) {
        item.querySelector(".ibody").innerHTML = detailHTML(c);
        wireEdit(item, c);
      }
      item.classList.toggle("open");
    });
    list.appendChild(item);
  });
  shown += slice.length;
  $("#moreBtn").style.display = shown < current.length ? "block" : "none";
  $("#count").textContent = `${current.length.toLocaleString("ja-JP")}件ヒット（${shown}件表示中）`;
}

function refresh() {
  current = filterCards();
  shown = 0;
  $("#list").innerHTML = "";
  renderMore();
}

["#q", "#fColor", "#fRarity", "#fType", "#fSrc", "#fSkill"].forEach((id) => {
  $(id).addEventListener("input", refresh);
});
$("#moreBtn").addEventListener("click", renderMore);
refresh();
</script>
</body>
</html>
