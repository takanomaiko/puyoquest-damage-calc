# 週1回、Puyo Nexus Wikiから新カードを自動で取り込むしくみ (GitHub Actions)
# 毎週月曜の朝6時(日本時間)に実行。手動実行もActionsタブからできます。
name: 週次カードDB更新

on:
  schedule:
    - cron: "0 21 * * 0" # 毎週日曜21:00 UTC = 月曜6:00 JST
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wikiから新カードを取り込み
        run: |
          python3 update_from_nexus.py
          python3 make_carddb.py

      - name: 変更があればコミットして公開
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add carddb.js carddb.csv nexus_cards.json
          if git diff --cached --quiet; then
            echo "新カードはありませんでした"
          else
            git commit -m "週次自動更新: 新カードを取り込み"
            git push
            # GitHub Pagesのビルドをリクエスト(自動で走らないことがあるため)
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages/builds"
          fi
